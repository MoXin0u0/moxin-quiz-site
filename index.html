<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨忻刷題網</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <h1>墨忻刷題網</h1>
        <p>支援多題庫的隨機刷題與錯題複習系統</p>
      </div>
      <nav class="top-actions" aria-label="主要功能">
        <button id="homeBtn" class="btn ghost" type="button">首頁</button>
        <button id="openWrongBookBtn" class="btn ghost" type="button">錯題本</button>
        <button id="openDataPanelBtn" class="btn ghost" type="button">資料管理</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="messageArea" class="message-area" aria-live="polite"></section>

    <section id="homeSection" class="page-section">
      <div class="section-title-row">
        <div>
          <h2>題庫選擇</h2>
          <p class="muted">選擇題庫後即可開始練習。答錯題會回到本輪稍後重做，直到全部答對才完成一輪。</p>
        </div>
        <div class="button-row">
          <button id="resumeProgressBtn" class="btn secondary hidden" type="button">繼續上次進度</button>
          <label class="btn primary file-label">
            匯入題庫
            <input id="importBankInput" type="file" accept=".json,application/json" />
          </label>
        </div>
      </div>

      <div class="panel">
        <h3>搜尋與練習篩選</h3>
        <div class="grid controls-grid">
          <label>
            題庫搜尋
            <input id="bankSearchInput" type="search" placeholder="搜尋題庫名稱、描述或分類" />
          </label>
          <label>
            題型篩選
            <select id="typeFilter">
              <option value="all">全部題型</option>
              <option value="single_choice">單選題</option>
              <option value="multiple_choice">複選題</option>
              <option value="true_false">是非題</option>
              <option value="fill_blank">填空題</option>
            </select>
          </label>
          <label>
            難度篩選
            <select id="difficultyFilter">
              <option value="all">全部</option>
              <option value="easy">easy</option>
              <option value="medium">medium</option>
              <option value="hard">hard</option>
            </select>
          </label>
          <label>
            標籤篩選
            <input id="tagFilter" type="text" placeholder="例如：ERP、文法；留空代表全部" />
          </label>
        </div>
      </div>

      <div id="bankList" class="bank-list"></div>
    </section>

    <section id="practiceSection" class="page-section hidden">
      <div class="practice-layout">
        <aside class="panel progress-panel">
          <h2 id="practiceBankTitle">題庫名稱</h2>
          <div id="progressStats" class="stats-list"></div>
          <div class="button-column">
            <button id="restartCurrentBtn" class="btn secondary" type="button">重新開始目前題庫</button>
            <button id="clearCurrentProgressBtn" class="btn danger-light" type="button">清除目前題庫進度</button>
            <button id="backHomeFromPracticeBtn" class="btn ghost" type="button">回首頁</button>
          </div>
        </aside>

        <section class="panel question-panel">
          <div class="question-meta">
            <span id="questionTypeBadge" class="badge">題型</span>
            <span id="questionIdBadge" class="badge light">題目 ID</span>
            <span id="questionDifficultyBadge" class="badge light">難度</span>
          </div>
          <div id="questionTags" class="tag-row"></div>
          <p id="questionWrongCount" class="wrong-count hidden"></p>
          <h2 id="questionText" class="question-text"></h2>
          <form id="answerForm" class="answer-form"></form>

          <div class="button-row question-buttons">
            <button id="submitAnswerBtn" class="btn primary" type="button">提交答案</button>
            <button id="nextQuestionBtn" class="btn secondary hidden" type="button">下一題</button>
          </div>

          <div id="explanationBox" class="explanation-box hidden"></div>
        </section>
      </div>
    </section>

    <section id="resultSection" class="page-section hidden">
      <div class="panel result-panel">
        <h2>本輪已完成</h2>
        <div id="resultStats" class="stats-list result-stats"></div>
        <h3>本輪錯題清單</h3>
        <div id="roundWrongList" class="wrong-list"></div>
        <div class="button-row">
          <button id="practiceAgainBtn" class="btn primary" type="button">再練習一次同一題庫</button>
          <button id="practiceWrongFromResultBtn" class="btn secondary" type="button">只練習錯題</button>
          <button id="exportRoundJsonBtn" class="btn ghost" type="button">匯出本輪 JSON</button>
          <button id="exportRoundCsvBtn" class="btn ghost" type="button">匯出本輪 CSV</button>
          <button id="backHomeFromResultBtn" class="btn ghost" type="button">回首頁</button>
        </div>
      </div>
    </section>

    <section id="wrongBookSection" class="page-section hidden">
      <div class="section-title-row">
        <div>
          <h2>錯題本</h2>
          <p class="muted">錯題答對後不會自動移除，可手動從錯題本移除。</p>
        </div>
        <div class="button-row">
          <button id="exportWrongBookJsonBtn" class="btn ghost" type="button">匯出錯題 JSON</button>
          <button id="exportWrongBookCsvBtn" class="btn ghost" type="button">匯出錯題 CSV</button>
          <button id="clearWrongBookBtn" class="btn danger-light" type="button">清除錯題本</button>
          <button id="backHomeFromWrongBookBtn" class="btn ghost" type="button">回首頁</button>
        </div>
      </div>
      <div id="wrongBookList" class="wrong-book-list"></div>
    </section>

    <section id="dataPanelSection" class="page-section hidden">
      <div class="panel">
        <h2>資料管理</h2>
        <p class="muted">本網站使用 localStorage 儲存資料。資料只存在目前這台裝置與目前瀏覽器，不會自動同步到其他裝置。</p>
        <div class="button-row">
          <button id="exportAllDataBtn" class="btn secondary" type="button">匯出所有本機資料</button>
          <label class="btn secondary file-label">
            匯入本機資料備份
            <input id="importAllDataInput" type="file" accept=".json,application/json" />
          </label>
          <button id="clearAllLocalDataBtn" class="btn danger" type="button">清除所有本機資料</button>
        </div>
        <hr />
        <h3>已匯入題庫</h3>
        <div id="importedBankList" class="imported-bank-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>墨忻刷題網｜純前端 GitHub Pages 版｜資料儲存在本機瀏覽器 localStorage</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
